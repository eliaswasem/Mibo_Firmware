[env:teensy-4_1]
platform = teensy
board = teensy41
framework = arduino
lib_deps =
	mikalhart/TinyGPSPlus @ ^1.1.0
	adafruit/Adafruit BMP280 Library @ ^2.6.8
	bblanchon/ArduinoJson @ ^7.2.2
	adafruit/Adafruit QMC5883P @ ^1.0.2
	adafruit/Adafruit BusIO @ ^1.16.1